name: Update Language Chart

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/scripts/generate-language-chart.mjs'
      - '.github/workflows/update-language-chart.yml'

permissions:
  contents: write

jobs:
  update-language-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate language chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: Mozeel-V
        run: node .github/scripts/generate-language-chart.mjs

      - name: Commit and push updates
        run: |
          if git diff --quiet; then
            echo "No chart changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/language-pie-chart.svg
          git commit -m "chore: auto-update language pie chart"
          git push
