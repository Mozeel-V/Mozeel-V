<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Language Distribution</title>
  <desc id="desc">Pie chart of primary programming languages used across projects.</desc>
  <style>
    .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #e5e7eb; }
    .value { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
    .title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
  </style>

  <text x="36" y="42" class="title">Project Language Distribution</text>

  <g transform="translate(200,190)">
    <circle r="90" fill="none" stroke="#3b82f6" stroke-width="80" stroke-dasharray="192.27 565.49" stroke-dashoffset="0" transform="rotate(-90)" />
    <circle r="90" fill="none" stroke="#f59e0b" stroke-width="80" stroke-dasharray="135.72 565.49" stroke-dashoffset="-192.27" transform="rotate(-90)" />
    <circle r="90" fill="none" stroke="#ef4444" stroke-width="80" stroke-dasharray="90.48 565.49" stroke-dashoffset="-327.99" transform="rotate(-90)" />
    <circle r="90" fill="none" stroke="#10b981" stroke-width="80" stroke-dasharray="79.17 565.49" stroke-dashoffset="-418.47" transform="rotate(-90)" />
    <circle r="90" fill="none" stroke="#8b5cf6" stroke-width="80" stroke-dasharray="45.24 565.49" stroke-dashoffset="-497.64" transform="rotate(-90)" />
    <circle r="90" fill="none" stroke="#64748b" stroke-width="80" stroke-dasharray="22.62 565.49" stroke-dashoffset="-542.88" transform="rotate(-90)" />
    <circle r="48" fill="#0f172a" />
    <text x="0" y="-2" text-anchor="middle" class="label">Languages</text>
    <text x="0" y="18" text-anchor="middle" class="value">Projects</text>
  </g>

  <g transform="translate(390,95)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="#3b82f6" />
    <text x="30" y="14" class="label">Python</text>
    <text x="180" y="14" class="value">34%</text>

    <rect x="0" y="38" width="18" height="18" rx="3" fill="#f59e0b" />
    <text x="30" y="52" class="label">C++</text>
    <text x="180" y="52" class="value">24%</text>

    <rect x="0" y="76" width="18" height="18" rx="3" fill="#ef4444" />
    <text x="30" y="90" class="label">C</text>
    <text x="180" y="90" class="value">16%</text>

    <rect x="0" y="114" width="18" height="18" rx="3" fill="#10b981" />
    <text x="30" y="128" class="label">JavaScript</text>
    <text x="180" y="128" class="value">14%</text>

    <rect x="0" y="152" width="18" height="18" rx="3" fill="#8b5cf6" />
    <text x="30" y="166" class="label">Java</text>
    <text x="180" y="166" class="value">8%</text>

    <rect x="0" y="190" width="18" height="18" rx="3" fill="#64748b" />
    <text x="30" y="204" class="label">Other</text>
    <text x="180" y="204" class="value">4%</text>
  </g>
</svg>
